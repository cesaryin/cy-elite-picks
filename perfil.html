<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CY Elite — Foto de perfil</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#06080c;display:flex;align-items:center;justify-content:center;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
.pf{position:relative;width:min(100vw,100vh);aspect-ratio:1;background:
  radial-gradient(circle at 50% 38%, #1a1606 0%, #0d1117 55%, #06080c 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.ring{position:absolute;inset:7%;border-radius:50%;border:2px solid #d4af3733;box-shadow:0 0 60px #d4af3722 inset}
.crown{font-size:30vmin;line-height:1;filter:drop-shadow(0 6px 30px #d4af3766);position:relative}
.brand{margin-top:1vmin;text-align:center;position:relative}
.brand .a{font-size:11.5vmin;font-weight:900;letter-spacing:.5vmin;color:#f0c75e;line-height:1;text-shadow:0 3px 18px #000}
.brand .b{font-size:6.4vmin;font-weight:800;letter-spacing:2.4vmin;color:#e6edf3;margin-top:.4vmin;padding-left:2.4vmin}
.tag{margin-top:2.4vmin;font-size:3.6vmin;font-weight:800;color:#3fb950;letter-spacing:.4vmin;background:#0f2e1a;border:1px solid #1f5c37;border-radius:3vmin;padding:1vmin 3vmin;position:relative}
.hint{position:absolute;bottom:2vmin;left:0;right:0;text-align:center;color:#30363d;font-size:2.4vmin}
</style>
</head>
<body>
<div class="pf">
  <div class="ring"></div>
  <div class="crown">👑</div>
  <div class="brand">
    <div class="a">CY ELITE</div>
    <div class="b">PICKS</div>
  </div>
  <div class="tag">📊 PICKS DE VALOR</div>
  <div class="hint">captura esta pantalla y recórtala al subirla</div>
</div>
</body>
</html>

<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Logos dark — comparación</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:16px}
.wrap{max-width:560px;margin:0 auto}
h1{text-align:center;font-size:20px;color:#f0c75e;padding:14px 0 4px}
p{text-align:center;color:#8b949e;font-size:13px;margin-bottom:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:14px;margin-bottom:12px}
.nm{text-align:center;font-weight:800;margin-bottom:10px}
.par{display:flex;gap:12px;justify-content:center}
.opt{flex:1;text-align:center;background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:14px}
.opt.sel{border-color:#f0c75e}
.lbl{font-size:10.5px;font-weight:800;color:#8b949e;letter-spacing:1px;margin-bottom:8px}
.lbl.gold{color:#f0c75e}
img{width:64px;height:64px;object-fit:contain}
</style></head><body><div class="wrap">
<h1>🧪 Logos para fondo oscuro</h1>
<p>Versiones OFICIALES "dark" de ESPN (las mismas que usan en su modo oscuro).<br>Izquierda: como está hoy · Derecha: propuesta</p>

<div class="card">
  <div class="nm">San Diego Padres</div>
  <div class="par">
    <div class="opt"><div class="lbl">ACTUAL</div><img src="https://a.espncdn.com/i/teamlogos/mlb/500/sd.png"></div>
    <div class="opt sel"><div class="lbl gold">DARK (propuesto)</div><img src="https://a.espncdn.com/i/teamlogos/mlb/500-dark/sd.png"></div>
  </div>
</div>
<div class="card">
  <div class="nm">New York Yankees</div>
  <div class="par">
    <div class="opt"><div class="lbl">ACTUAL</div><img src="https://a.espncdn.com/i/teamlogos/mlb/500/nyy.png"></div>
    <div class="opt sel"><div class="lbl gold">DARK (propuesto)</div><img src="https://a.espncdn.com/i/teamlogos/mlb/500-dark/nyy.png"></div>
  </div>
</div>
<div class="card">
  <div class="nm">Kansas City Royals</div>
  <div class="par">
    <div class="opt"><div class="lbl">ACTUAL</div><img src="https://a.espncdn.com/i/teamlogos/mlb/500/kc.png"></div>
    <div class="opt sel"><div class="lbl gold">DARK (propuesto)</div><img src="https://a.espncdn.com/i/teamlogos/mlb/500-dark/kc.png"></div>
  </div>
</div>
</div></body></html>
